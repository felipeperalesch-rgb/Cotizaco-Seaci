<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Cotizador Seaci{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-light border-bottom fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand brand" href="/">⚡ Cotizador Seaci</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/">Cotizaciones</a></li>
        <li class="nav-item"><a class="nav-link" href="/quotes/new">Nueva cotización</a></li>
       
      </ul>
    </div>
  </div>
</nav>

<main class="container print-container" style="margin-top: 4rem;">
  {% block content %}{% endblock %}
</main>

<script>
// Utilidades front-end
function numberOrZero(value) {
  const n = parseFloat(value);
  return isNaN(n) ? 0 : n;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
